name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate static site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f index.html
          test -f src/standalone.js
          test -f src/styles.css
          test -f src/icon-data/normal.js
          test -f src/icon-data/feature.js
          test -f src/icon-data/important.js
          test -f src/icon-data/survey.js
          test -f src/icon-data/revisit.js
          test -f src/icon-data/tutorial.js
          test -f src/icon-data/click-hand.js

      - name: Check JavaScript syntax
        run: node --check src/standalone.js

      - name: Check page references
        run: |
          grep -q './src/styles.css' index.html
          grep -q './src/standalone.js' index.html

  deploy:
    name: Deploy to Pages
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
